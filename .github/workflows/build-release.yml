name: Build and Release

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android (APK)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js 24 (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Debug - Check Node.js and npm
        run: |
          node --version
          npm --version
          which node
          which npm

      - name: Install npm dependencies (with all fixes)
        run: |
          echo "Installing npm dependencies..."
          npm install --legacy-peer-deps
          
          echo "Installing react-native-worklets (required by react-native-reanimated)..."
          npm install react-native-worklets --legacy-peer-deps --no-save
          
          echo "Verifying critical dependencies..."
          npm list react-native react-native-worklets @react-native-voice/voice 2>/dev/null | head -10

      - name: Fix react-native-voice (jcenter + compileSdk)
        run: |
          VOICE_BUILD_GRADLE="node_modules/@react-native-voice/voice/android/build.gradle"
          if [ -f "$VOICE_BUILD_GRADLE" ]; then
            echo "Patching react-native-voice..."
            # Replace jcenter() with mavenCentral()
            sed -i 's/jcenter()/mavenCentral()/g' "$VOICE_BUILD_GRADLE"
            
            # Add compileSdk and defaultConfig if missing
            if ! grep -q "compileSdk" "$VOICE_BUILD_GRADLE"; then
              sed -i '/android {/a \    compileSdk 34\n    defaultConfig {\n        minSdk 24\n        targetSdk 34\n    }' "$VOICE_BUILD_GRADLE"
            fi
            
            echo "Patched react-native-voice:"
            grep -A 5 "android {" "$VOICE_BUILD_GRADLE"
          else
            echo "react-native-voice not found - skipping patch"
          fi

      - name: Temporarily disable problematic libraries (if needed)
        run: |
          # Option 1: Remove react-native-voice if it causes issues
          if [ -d "node_modules/@react-native-voice" ]; then
            echo "Temporarily removing react-native-voice to avoid build errors..."
            rm -rf node_modules/@react-native-voice
            
            # Remove from package.json to prevent reinstall
            sed -i 's/"@react-native-voice\/voice":.*//g' package.json
            sed -i '/^$/d' package.json  # Remove empty lines
          fi
          
          # Option 2: Remove react-native-reanimated if still failing
          # rm -rf node_modules/react-native-reanimated

      - name: Clean Gradle cache
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean --no-daemon
          rm -rf ~/.gradle/caches/

      - name: Fix dependency conflicts (AndroidX + packaging)
        run: |
          if ! grep -q "android.enableJetifier=true" android/gradle.properties; then
            echo "android.enableJetifier=true" >> android/gradle.properties
          fi
          
          if ! grep -q "android.packagingOptions.pickFirsts" android/gradle.properties; then
            cat >> android/gradle.properties << 'EOF'

          # Resolve duplicate class conflicts
          android.packagingOptions.pickFirsts=lib/armeabi-v7a/libc++_shared.so,lib/arm64-v8a/libc++_shared.so
          android.packagingOptions.excludes=META-INF/proguard/androidx-*.pro
          EOF
          fi

      - name: Install essential Linux tools (uname, xargs)
        run: |
          echo "Installing uname and xargs..."
          sudo apt-get update -y && sudo apt-get install -y coreutils findutils
          which uname && uname -a
          which xargs && xargs --version

      - name: Build Android APK (FINAL attempt)
        run: |
          cd android
          echo "Running gradlew with bash (not sh)..."
          bash ./gradlew assembleRelease -x checkReleaseDuplicateClasses --no-daemon -Dorg.gradle.jvmargs="-Xmx4g" \
            -Porg.gradle.java.home=$JAVA_HOME \
            -Dorg.gradle.logging.level=debug
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          CI: "false"
          NODE_PATH: ${{ github.workspace }}/node_modules
          PATH: /opt/hostedtoolcache/node/24.x.x/x64/bin:$PATH
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.logging.level=debug"

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Argus-Android
          path: android/app/build/outputs/apk/release/app-release.apk

  create-release:
    name: Create GitHub Release
    needs: [build-android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: Argus-Android
      
      - name: Rename APK
        run: mv app-release.apk Argus.apk
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: Argus.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}