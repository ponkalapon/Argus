name: Build and Release

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android (APK)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Полный клон репозитория

      - name: Set up Node.js 24 (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Debug - Check Node.js and npm
        run: |
          node --version
          npm --version
          which node
          which npm

      - name: Clean Gradle and Node cache
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean
          rm -rf ~/.gradle/caches/
          npm cache clean --force

      - name: Install dependencies (with --legacy-peer-deps)
        run: npm install --legacy-peer-deps

      - name: Debug - List node_modules
        run: ls -la node_modules/ || true

      - name: Patch react-native-voice
        run: |
          # Fix jcenter() and compileSdk errors in react-native-voice
          VOICE_BUILD_GRADLE="node_modules/@react-native-voice/voice/android/build.gradle"
          if [ -f "$VOICE_BUILD_GRADLE" ]; then
            sed -i 's/jcenter()/mavenCentral()/g' "$VOICE_BUILD_GRADLE"
            sed -i '/android {/a \    compileSdk 34\n    defaultConfig {\n        minSdk 24\n        targetSdk 34\n    }' "$VOICE_BUILD_GRADLE"
          fi

      - name: Fix dependency conflicts (AndroidX migration)
        run: |
          # Add gradle.properties settings to force AndroidX and enable jetifier
          if ! grep -q "android.enableJetifier=true" android/gradle.properties; then
            echo "android.enableJetifier=true" >> android/gradle.properties
          fi
          
          # Add packaging options to resolve duplicate classes
          if ! grep -q "android.packagingOptions.pickFirsts" android/gradle.properties; then
            cat >> android/gradle.properties << 'EOF'

          # Resolve duplicate class conflicts (AndroidX migration)
          android.packagingOptions.pickFirsts=lib/armeabi-v7a/libc++_shared.so,lib/arm64-v8a/libc++_shared.so
          android.packagingOptions.excludes=META-INF/proguard/androidx-*.pro
          EOF
          fi

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Debug - Check gradlew permissions
        run: ls -la android/gradlew

      - name: Build Android APK
        run: cd android && ./gradlew assembleRelease -x checkReleaseDuplicateClasses --stacktrace --info
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          CI: "false"
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"  # Принудительно используем Node.js 24

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Argus-Android
          path: android/app/build/outputs/apk/release/app-release.apk

  create-release:
    name: Create GitHub Release
    needs: [build-android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: Argus-Android
      
      - name: Rename APK
        run: mv app-release.apk Argus.apk
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: Argus.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}