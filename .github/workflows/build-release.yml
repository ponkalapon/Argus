name: Build and Release

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android (APK)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js 24 (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Debug - Check Node.js and npm
        run: |
          node --version
          npm --version
          which node
          which npm

      - name: Install npm dependencies (with all fixes)
        run: |
          echo "Installing npm dependencies..."
          npm install --legacy-peer-deps
          
          echo "Ensuring expo-modules-autolinking is installed..."
          npm install expo-modules-autolinking --legacy-peer-deps --save-dev
          
          echo "Installing react-native-worklets@0.8.0 (compatible with reanimated@4.3.1)..."
          npm install react-native-worklets@0.8.0 --legacy-peer-deps --no-save
          
          echo "Verifying critical dependencies..."
          npm list react-native react-native-worklets expo-modules-autolinking 2>/dev/null | head -10

      - name: Create required widget directory structure
        run: |
          mkdir -p widgets/android/src/main/java/package_name
          echo "Widget directory structure created"

      - name: Run expo prebuild to generate correct Android structure
        run: |
          echo "Running expo prebuild..."
          npx expo prebuild --clean --platform android --no-install

      - name: Clean Gradle cache
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean --no-daemon
          rm -rf ~/.gradle/caches/

      - name: Fix dependency conflicts (AndroidX + packaging)
        run: |
          if ! grep -q "android.enableJetifier=true" android/gradle.properties; then
            echo "android.enableJetifier=true" >> android/gradle.properties
          fi
          
          if ! grep -q "android.packagingOptions.pickFirsts" android/gradle.properties; then
            cat >> android/gradle.properties << 'EOF'

          # Resolve duplicate class conflicts
          android.packagingOptions.pickFirsts=lib/armeabi-v7a/libc++_shared.so,lib/arm64-v8a/libc++_shared.so
          android.packagingOptions.excludes=META-INF/proguard/androidx-*.pro
          EOF
          fi

      - name: Install essential Linux tools (bash, uname, xargs)
        run: |
          echo "Installing bash, uname, and xargs..."
          sudo apt-get update -y && sudo apt-get install -y bash coreutils findutils
          which bash && bash --version
          which uname && uname -a
          which xargs && xargs --version

      - name: Build Android APK (Release)
        run: |
          cd android
          echo "Checking gradlew permissions and existence..."
          ls -la gradlew
          chmod +x gradlew
          
          echo "Running Gradle build..."
          ./gradlew assembleRelease --no-daemon -Dorg.gradle.jvmargs="-Xmx4g"
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          CI: "false"
          NODE_PATH: ${{ github.workspace }}/node_modules
          PATH: /opt/hostedtoolcache/node/24.x.x/x64/bin:$PATH
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Argus-Android
          path: android/app/build/outputs/apk/release/app-release.apk

  create-release:
    name: Create GitHub Release
    needs: [build-android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: Argus-Android
      
      - name: Rename APK
        run: mv app-release.apk Argus.apk
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: Argus.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
