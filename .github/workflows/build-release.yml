name: Build and Release

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android (APK)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js 24 (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Debug - Check Node.js and npm
        run: |
          node --version
          npm --version
          which node
          which npm

      - name: Install npm dependencies FIRST
        run: |
          echo "Installing npm dependencies..."
          npm install --legacy-peer-deps
          echo "Verifying react-native installation..."
          npm list react-native 2>/dev/null | head -20 || echo "react-native not found in direct deps"
          echo "Checking if node_modules/@react-native exists..."
          ls -la node_modules/@react-native 2>/dev/null | head -5 || echo "node_modules/@react-native not found"

      - name: Clean Gradle cache (NOT node_modules)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean --no-daemon
          rm -rf ~/.gradle/caches/

      - name: Verify Gradle can find Node.js and dependencies
        run: |
          echo "Testing Node.js from Android directory..."
          cd android
          node --version
          npm list react-native --depth=0 2>/dev/null || echo "react-native check from android/ - not critical"

      - name: Patch react-native-voice (if exists)
        run: |
          VOICE_BUILD_GRADLE="node_modules/@react-native-voice/voice/android/build.gradle"
          if [ -f "$VOICE_BUILD_GRADLE" ]; then
            sed -i 's/jcenter()/mavenCentral()/g' "$VOICE_BUILD_GRADLE"
            sed -i '/android {/a \    compileSdk 34\n    defaultConfig {\n        minSdk 24\n        targetSdk 34\n    }' "$VOICE_BUILD_GRADLE"
          fi

      - name: Fix dependency conflicts (AndroidX migration)
        run: |
          if ! grep -q "android.enableJetifier=true" android/gradle.properties; then
            echo "android.enableJetifier=true" >> android/gradle.properties
          fi
          
          if ! grep -q "android.packagingOptions.pickFirsts" android/gradle.properties; then
            cat >> android/gradle.properties << 'EOF'

          # Resolve duplicate class conflicts (AndroidX migration)
          android.packagingOptions.pickFirsts=lib/armeabi-v7a/libc++_shared.so,lib/arm64-v8a/libc++_shared.so
          android.packagingOptions.excludes=META-INF/proguard/androidx-*.pro
          EOF
          fi

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Android APK
        run: cd android && ./gradlew assembleRelease -x checkReleaseDuplicateClasses --no-daemon -Dorg.gradle.jvmargs="-Xmx2g"
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          CI: "false"
          NODE_PATH: /home/runner/work/Argus/Argus/node_modules  # Явно указываем путь к node_modules
          PATH: /opt/hostedtoolcache/node/24.x.x/x64/bin:$PATH  # Гарантируем Node.js 24 в PATH

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Argus-Android
          path: android/app/build/outputs/apk/release/app-release.apk

  create-release:
    name: Create GitHub Release
    needs: [build-android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: Argus-Android
      
      - name: Rename APK
        run: mv app-release.apk Argus.apk
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: Argus.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}