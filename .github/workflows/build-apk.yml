name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/argus-mobile

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Determine next build number
        id: version
        run: |
          git fetch --tags origin 2>/dev/null || true
          LAST_TAG=$(git tag -l 'build*' --sort=-v:refname | head -1)
          if [ -z "$LAST_TAG" ]; then
            NEXT_BUILD=1
          else
            NUM=$(echo "$LAST_TAG" | sed 's/build//')
            NEXT_BUILD=$((NUM + 1))
          fi
          echo "build=$NEXT_BUILD" >> "$GITHUB_OUTPUT"
          echo "tag=build$NEXT_BUILD" >> "$GITHUB_OUTPUT"
          echo "Next build: $NEXT_BUILD (last tag: $LAST_TAG)"

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: gradle-${{ hashFiles('apps/argus-mobile/android/**/*.gradle*', 'apps/argus-mobile/android/**/gradle-wrapper.properties', '**/package-lock.json') }}
          restore-keys: |
            gradle-

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            npm-

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: |
          cd ../../
          npm ci

      - name: Patch CURRENT_BUILD in autoUpdate.ts
        run: |
          sed -i "s/export const CURRENT_BUILD = [0-9]*;/export const CURRENT_BUILD = ${{ steps.version.outputs.build }};/" src/services/autoUpdate.ts
          grep "CURRENT_BUILD" src/services/autoUpdate.ts

      - name: Expo prebuild
        run: npx expo prebuild --platform android --no-install

      - name: Set SDK path
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Build APK
        run: cd android && ./gradlew assembleRelease --no-daemon -PreactNativeArchitectures=arm64-v8a

      - name: Create git tag
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag "build${{ steps.version.outputs.build }}" HEAD
          git push origin "build${{ steps.version.outputs.build }}"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "build${{ steps.version.outputs.build }}"
          name: "build${{ steps.version.outputs.build }}"
          files: apps/argus-mobile/android/app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true
          fail_on_unmatched_files: false
