name: Build APK

on:
  push:
    branches: [master]
    paths:
      - 'apps/argus-mobile/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/build-apk.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/argus-mobile

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine version
        id: version
        run: |
          git fetch --tags origin 2>/dev/null || true
          LAST_TAG=$(git tag -l 'v0.*' --sort=-v:refname | head -1)
          if [ -z "$LAST_TAG" ]; then
            MINOR=1
          else
            MINOR=$(echo "$LAST_TAG" | sed 's/v0\.\([0-9]*\)\..*/\1/')
            MINOR=$((MINOR + 1))
          fi
          DATE=$(date +'%Y.%-m.%-d')
          SEMVER="v0.${MINOR}.0"
          DATE_TAG="v${DATE}"
          RELEASE_NAME="Argus ${SEMVER} (${DATE_TAG})"
          GIT_TAG="v0.${MINOR}.0"
          echo "minor=$MINOR" >> "$GITHUB_OUTPUT"
          echo "semver=$SEMVER" >> "$GITHUB_OUTPUT"
          echo "date_tag=$DATE_TAG" >> "$GITHUB_OUTPUT"
          echo "release_name=$RELEASE_NAME" >> "$GITHUB_OUTPUT"
          echo "git_tag=$GIT_TAG" >> "$GITHUB_OUTPUT"
          echo "build=$MINOR" >> "$GITHUB_OUTPUT"
          echo "Release: $RELEASE_NAME (tag: $GIT_TAG)"

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: gradle-${{ hashFiles('apps/argus-mobile/android/**/*.gradle*', 'apps/argus-mobile/android/**/gradle-wrapper.properties', '**/package-lock.json') }}
          restore-keys: |
            gradle-

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            npm-

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: |
          cd ../../
          npm ci

      - name: Patch CURRENT_BUILD in autoUpdate.ts
        run: |
          sed -i "s/export const CURRENT_BUILD = [0-9]*;/export const CURRENT_BUILD = ${{ steps.version.outputs.minor }};/" src/services/autoUpdate.ts
          grep "CURRENT_BUILD" src/services/autoUpdate.ts

      - name: Expo prebuild
        run: npx expo prebuild --platform android --no-install

      - name: Set SDK path
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Build APK
        run: cd android && ./gradlew assembleRelease --no-daemon -PreactNativeArchitectures=arm64-v8a

      - name: Create git tag
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag -f "${{ steps.version.outputs.git_tag }}" HEAD
          git push origin "${{ steps.version.outputs.git_tag }}" --force

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ steps.version.outputs.git_tag }}"
          name: "${{ steps.version.outputs.release_name }}"
          files: apps/argus-mobile/android/app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true
          fail_on_unmatched_files: false
