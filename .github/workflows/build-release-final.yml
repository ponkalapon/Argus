name: Build and Release - FINAL

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android (APK) - FINAL
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Полная очистка окружения (резервный вариант)
      - name: Full environment reset
        run: |
          echo "Resetting environment..."
          sudo rm -rf /usr/local/bin/bash /usr/bin/bash /bin/bash || true
          sudo apt-get update -y && sudo apt-get install -y --reinstall bash coreutils findutils
          which bash && bash --version
          which ls && ls --version

      - name: Set up Node.js 24 (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install npm dependencies (with all fixes)
        run: |
          echo "Installing npm dependencies..."
          npm install --legacy-peer-deps
          npm install react-native-worklets --legacy-peer-deps --no-save
          echo "Verifying critical dependencies..."
          npm list react-native react-native-worklets @react-native-voice/voice 2>/dev/null | head -10

      - name: Fix react-native-voice (jcenter + compileSdk)
        run: |
          VOICE_BUILD_GRADLE="node_modules/@react-native-voice/voice/android/build.gradle"
          if [ -f "$VOICE_BUILD_GRADLE" ]; then
            echo "Patching react-native-voice..."
            sed -i 's/jcenter()/mavenCentral()/g' "$VOICE_BUILD_GRADLE"
            if ! grep -q "compileSdk" "$VOICE_BUILD_GRADLE"; then
              sed -i '/android {/a \    compileSdk 34\n    defaultConfig {\n        minSdk 24\n        targetSdk 34\n    }' "$VOICE_BUILD_GRADLE"
            fi
          fi

      - name: Temporarily disable problematic libraries (if needed)
        run: |
          if [ -d "node_modules/@react-native-voice" ]; then
            echo "Temporarily removing react-native-voice..."
            rm -rf node_modules/@react-native-voice
            sed -i 's/"@react-native-voice\/voice":.*//g' package.json
            sed -i '/^$/d' package.json
          fi

      - name: Clean Gradle cache
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean --no-daemon
          rm -rf ~/.gradle/caches/

      - name: Fix dependency conflicts (AndroidX + packaging)
        run: |
          if ! grep -q "android.enableJetifier=true" android/gradle.properties; then
            echo "android.enableJetifier=true" >> android/gradle.properties
          fi
          if ! grep -q "android.packagingOptions.pickFirsts" android/gradle.properties; then
            cat >> android/gradle.properties << 'EOF'

          android.packagingOptions.pickFirsts=lib/armeabi-v7a/libc++_shared.so,lib/arm64-v8a/libc++_shared.so
          android.packagingOptions.excludes=META-INF/proguard/androidx-*.pro
          EOF
          fi

      - name: Build Android APK (DIRECT gradlew execution)
        run: |
          cd android
          echo "Running gradlew DIRECTLY (no system dependencies)..."
          ./gradlew assembleRelease -x checkReleaseDuplicateClasses --no-daemon -Dorg.gradle.jvmargs="-Xmx4g"
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          CI: "false"
          NODE_PATH: ${{ github.workspace }}/node_modules

      - name: Upload APK artifact (NO ls dependency)
        if: success()
        run: |
          echo "APK should be at: android/app/build/outputs/apk/release/app-release.apk"
          if [ -f "android/app/build/outputs/apk/release/app-release.apk" ]; then
            echo "APK found! Uploading..."
            curl -X POST -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              -H "Content-Type: application/zip" \
              --data-binary "@android/app/build/outputs/apk/release/app-release.apk" \
              "https://uploads.github.com/repos/${{ github.repository }}/releases/${{ github.run_id }}/assets?name=Argus-Android.apk"
          else
            echo "APK not found!"
            exit 1
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}