name: Build and Release - FINAL

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-android:
    name: Build Android (APK) - FINAL
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.1.7
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4.3.0
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install npm dependencies (minimal)
        run: npm install --legacy-peer-deps

      - name: Clean Gradle cache
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean --no-daemon

      - name: Build Android APK (DIRECT gradlew execution)
        run: |
          cd android
          ./gradlew assembleRelease -x checkReleaseDuplicateClasses --no-daemon -Dorg.gradle.jvmargs="-Xmx4g"
        env:
          CI: "false"
          JAVA_HOME: /opt/hostedtoolcache/Java_Temurin-Hotspot_jdk/17.0.19-10/x64

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4.3.4
        with:
          name: Argus-Android-FINAL
          path: android/app/build/outputs/apk/release/app-release.apk