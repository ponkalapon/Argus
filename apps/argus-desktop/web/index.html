<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Argus</title>
    <style id="expo-reset">
      /* Full-screen reset */
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
      }
      /* Root element must fill the entire viewport */
      #root {
        display: flex;
        width: 100%;
        height: 100%;
        flex: 1;
        overflow: hidden;
      }
      /* Ensure any canvas/image backgrounds fill 100% */
      img, canvas {
        max-width: none;
      }
    </style>
  </head>
  <body>
    <noscript>
      You need to enable JavaScript to run this app.
    </noscript>
    <div id="root"></div>
  </body>
</html>
