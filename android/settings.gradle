// android/settings.gradle

rootProject.name = "Argus"
include ":"

// Статические пути для Gradle-плагинов (замена автолинкингу)
includeBuild("../node_modules/@react-native/gradle-plugin")
includeBuild("../node_modules/expo-modules-autolinking/expo-gradle-plugin")

plugins {
  id("com.facebook.react.settings")
  id("expo-autolinking-settings")
}

extensions.configure(com.facebook.react.ReactSettingsExtension) { ex ->
  ex.autolinkLibrariesFromCommand()
}

expoAutolinking.useExpoModules()

include ":app"
include ":expo"
project(":expo").projectDir = new File(rootProject.projectDir, "../node_modules/expo/android")